<!--
StudyPal AI 学习助手组件
独立的 AI 聊天界面组件，可嵌入任何页面底部
使用方式：直接嵌入此 HTML 内容，CSS 和 JS 已内联
-->

<!-- AI 助手底部悬浮组件 -->
<div id="ai-assistant-footer" class="ai-footer-container">
    <!-- 展开/收起按钮 -->
    <button class="ai-footer-toggle" id="aiFooterToggle" onclick="toggleAiFooter()">
        <span class="ai-footer-icon">🤖</span>
        <span class="ai-footer-label">AI 助手</span>
        <span class="ai-footer-arrow" id="aiFooterArrow">▲</span>
    </button>

    <!-- AI 聊天面板 -->
    <div class="ai-footer-panel" id="aiFooterPanel">
        <div class="ai-footer-header">
            <div class="ai-footer-title">🤖 AI 学习助手</div>
            <div class="ai-footer-controls">
                <button class="ai-footer-btn" onclick="startNewChat()" title="新对话">+ 新对话</button>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="ai-footer-tabs">
            <button class="ai-tab-btn active" id="aiTabCurrent" onclick="switchAiTab('current')">当前对话</button>
            <button class="ai-tab-btn" id="aiTabHistory" onclick="switchAiTab('history')">历史记录</button>
        </div>

        <!-- 当前对话视图 -->
        <div id="aiCurrentView" class="ai-view-container">
            <div class="ai-messages" id="aiMessages">
                <div class="ai-message ai">
                    嗨！我是你的学习搭子 StudyPal～有什么学习问题可以问我哦！💪
                </div>
            </div>
            <div class="ai-input-row">
                <input type="text" id="aiInput" class="ai-input" placeholder="输入你的问题..." onkeypress="handleAiKeypress(event)">
                <button onclick="sendAiMsg()" id="aiSendBtn" class="ai-send-btn">
                    <span id="aiSendText">发送</span>
                </button>
            </div>
        </div>

        <!-- 历史记录视图 -->
        <div id="aiHistoryView" class="ai-view-container" style="display: none;">
            <div class="ai-history-list" id="aiHistoryList">
                <!-- 历史对话列表 -->
            </div>
        </div>

        <!-- 对话详情视图 -->
        <div id="aiDetailView" class="ai-view-container" style="display: none;">
            <div class="ai-detail-header">
                <button class="ai-footer-btn" onclick="backToAiHistory()">← 返回</button>
                <button class="ai-footer-btn danger" onclick="deleteAiChat()">🗑️ 删除</button>
            </div>
            <div class="ai-messages" id="aiDetailMessages">
                <!-- 消息列表 -->
            </div>
        </div>
    </div>
</div>

<style>
/* ==================== AI 底部悬浮组件样式 ==================== */
.ai-footer-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

/* 展开/收起按钮 */
.ai-footer-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    border: none;
    border-radius: 50px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    transition: all 0.3s ease;
    margin-left: auto;
}

.ai-footer-toggle:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
}

.ai-footer-icon {
    font-size: 18px;
}

.ai-footer-arrow {
    font-size: 10px;
    transition: transform 0.3s ease;
}

.ai-footer-container.expanded .ai-footer-arrow {
    transform: rotate(180deg);
}

/* 聊天面板 */
.ai-footer-panel {
    position: absolute;
    bottom: 70px;
    right: 0;
    width: 380px;
    max-height: 600px;
    background: white;
    border-radius: 24px;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.15);
    overflow: hidden;
    display: none;
    flex-direction: column;
    animation: aiSlideUp 0.3s ease;
}

.ai-footer-container.expanded .ai-footer-panel {
    display: flex;
}

@keyframes aiSlideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.ai-footer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    border-bottom: 1px solid #e2e8f0;
}

.ai-footer-title {
    font-size: 16px;
    font-weight: 700;
    color: #1e293b;
}

.ai-footer-controls {
    display: flex;
    gap: 8px;
}

.ai-footer-btn {
    padding: 6px 12px;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 12px;
    color: #64748b;
    cursor: pointer;
    transition: all 0.2s;
}

.ai-footer-btn:hover {
    background: #f1f5f9;
    color: #1e293b;
}

.ai-footer-btn.danger {
    color: #ef4444;
}

.ai-footer-btn.danger:hover {
    background: rgba(239, 68, 68, 0.1);
}

/* 标签页 */
.ai-footer-tabs {
    display: flex;
    padding: 12px 16px;
    gap: 8px;
    border-bottom: 1px solid #f1f5f9;
}

.ai-tab-btn {
    flex: 1;
    padding: 8px 12px;
    border: none;
    background: #f1f5f9;
    border-radius: 8px;
    font-size: 13px;
    color: #64748b;
    cursor: pointer;
    transition: all 0.2s;
}

.ai-tab-btn.active {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
}

/* 视图容器 */
.ai-view-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 400px;
    max-height: 500px;
}

/* 消息区域 */
.ai-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: #f8fafc;
}

.ai-message {
    margin-bottom: 12px;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    animation: aiMsgFadeIn 0.3s ease;
}

@keyframes aiMsgFadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.ai-message.user {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0.08) 100%);
    margin-left: 15%;
    border: 1px solid rgba(99, 102, 241, 0.2);
}

.ai-message.ai {
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(16, 185, 129, 0.08) 100%);
    margin-right: 15%;
    border: 1px solid rgba(16, 185, 129, 0.2);
}

.ai-message .msg-time {
    display: block;
    font-size: 10px;
    color: #94a3b8;
    margin-top: 6px;
    text-align: right;
}

/* 加载动画 */
.ai-message.loading {
    display: flex;
    align-items: center;
    gap: 8px;
}

.ai-loading-dots {
    display: flex;
    gap: 4px;
}

.ai-loading-dots span {
    width: 8px;
    height: 8px;
    background: #6366f1;
    border-radius: 50%;
    animation: aiLoadingBounce 1.4s infinite ease-in-out;
}

.ai-loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.ai-loading-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes aiLoadingBounce {
    0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
}

/* 输入区域 */
.ai-input-row {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #f1f5f9;
}

.ai-input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

.ai-input:focus {
    border-color: #6366f1;
}

.ai-send-btn {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
}

.ai-send-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
}

.ai-send-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

/* 历史记录列表 */
.ai-history-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
}

.ai-history-item {
    display: flex;
    align-items: center;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 8px;
    background: #f8fafc;
    cursor: pointer;
    transition: all 0.2s;
}

.ai-history-item:hover {
    background: #f1f5f9;
    transform: translateX(5px);
}

.ai-history-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border-radius: 10px;
    font-size: 16px;
    margin-right: 12px;
}

.ai-history-info {
    flex: 1;
    min-width: 0;
}

.ai-history-title {
    font-size: 14px;
    font-weight: 500;
    color: #1e293b;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.ai-history-meta {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 2px;
}

.ai-history-delete {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #94a3b8;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.ai-history-delete:hover {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
}

.ai-detail-header {
    display: flex;
    justify-content: space-between;
    padding: 12px 16px;
    background: #f8fafc;
    border-bottom: 1px solid #f1f5f9;
}

/* 空状态 */
.ai-empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: #94a3b8;
}

.ai-empty-state .empty-icon {
    font-size: 48px;
    margin-bottom: 15px;
    opacity: 0.5;
}

/* 响应式 */
@media (max-width: 480px) {
    .ai-footer-container {
        bottom: 10px;
        right: 10px;
    }

    .ai-footer-panel {
        width: calc(100vw - 20px);
        right: -5px;
        max-height: 70vh;
    }

    .ai-footer-toggle {
        padding: 10px 16px;
        font-size: 13px;
    }
}
</style>

<script>
/* ==================== AI 底部组件脚本 ==================== */
// 全局变量
var aiFooterConversationId = null;
var aiFooterCurrentTab = 'current';
var aiDetailConvId = null;

// 切换展开/收起
function toggleAiFooter() {
    var container = document.getElementById('ai-assistant-footer');
    container.classList.toggle('expanded');
}

// 切换标签页
function switchAiTab(tab) {
    var currentTab = document.getElementById('aiTabCurrent');
    var historyTab = document.getElementById('aiTabHistory');
    var currentView = document.getElementById('aiCurrentView');
    var historyView = document.getElementById('aiHistoryView');
    var detailView = document.getElementById('aiDetailView');

    if (tab === 'current') {
        currentTab.classList.add('active');
        historyTab.classList.remove('active');
        currentView.style.display = 'flex';
        historyView.style.display = 'none';
        detailView.style.display = 'none';
    } else {
        currentTab.classList.remove('active');
        historyTab.classList.add('active');
        currentView.style.display = 'none';
        historyView.style.display = 'flex';
        detailView.style.display = 'none';
        loadAiHistory();
    }
    aiFooterCurrentTab = tab;
}

// 发送消息
function handleAiKeypress(event) {
    if (event.key === 'Enter') {
        sendAiMsg();
    }
}

async function sendAiMsg() {
    var input = document.getElementById('aiInput');
    var question = input.value.trim();
    if (!question) return;

    addAiMessage(question, 'user');
    input.value = '';

    var sendBtn = document.getElementById('aiSendBtn');
    var sendText = document.getElementById('aiSendText');
    sendText.innerHTML = '<span class="ai-loading-dots"><span></span><span></span><span></span></span>';
    sendBtn.disabled = true;

    var loadingMsg = addAiMessage('', 'ai', true);

    try {
        var response = await fetch('/api/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                question: question,
                conversation_id: aiFooterConversationId
            })
        });

        var data = await response.json();

        if (loadingMsg) loadingMsg.remove();

        if (response.ok) {
            addAiMessage(data.answer, 'ai');
            if (data.conversation_id) {
                aiFooterConversationId = data.conversation_id;
            }
        } else {
            addAiMessage('错误：' + data.error, 'ai');
        }
    } catch (error) {
        if (loadingMsg) loadingMsg.remove();
        addAiMessage('错误：无法连接到服务器', 'ai');
        console.error('AI 请求失败:', error);
    } finally {
        sendText.textContent = '发送';
        sendBtn.disabled = false;
    }
}

// 添加消息
function addAiMessage(text, type, isLoading) {
    var container = document.getElementById('aiMessages');
    var message = document.createElement('div');
    message.className = 'ai-message ' + type;

    if (isLoading) {
        message.classList.add('loading');
        message.innerHTML = '<div class="ai-loading-dots"><span></span><span></span><span></span></div>正在思考...';
    } else {
        var now = new Date();
        var timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        message.innerHTML = text + '<span class="msg-time">' + timeStr + '</span>';
    }

    container.appendChild(message);
    container.scrollTop = container.scrollHeight;
    return message;
}

// 加载历史记录
async function loadAiHistory() {
    try {
        var response = await fetch('/api/ai/history');
        var data = await response.json();

        var historyList = document.getElementById('aiHistoryList');
        if (data.conversations && data.conversations.length > 0) {
            historyList.innerHTML = data.conversations.map(function(conv) {
                var date = new Date(conv.updated_at);
                var timeStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' +
                             date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                return '<div class="ai-history-item" onclick="openAiDetail(\'' + conv.id + '\')">' +
                       '<div class="ai-history-icon">💬</div>' +
                       '<div class="ai-history-info">' +
                       '<div class="ai-history-title">' + escapeHtml(conv.title) + '</div>' +
                       '<div class="ai-history-meta">' + conv.message_count + ' 条消息 · ' + timeStr + '</div>' +
                       '</div>' +
                       '<button class="ai-history-delete" onclick="event.stopPropagation(); deleteAiHistory(\'' + conv.id + '\')">×</button>' +
                       '</div>';
            }).join('');
        } else {
            historyList.innerHTML = '<div class="ai-empty-state"><div class="empty-icon">💭</div><div>暂无历史对话</div></div>';
        }
    } catch (error) {
        console.error('加载历史记录失败:', error);
    }
}

// 打开对话详情
async function openAiDetail(convId) {
    try {
        var response = await fetch('/api/ai/history/' + convId);
        var data = await response.json();

        if (data.messages && data.messages.length > 0) {
            var currentView = document.getElementById('aiCurrentView');
            var historyView = document.getElementById('aiHistoryView');
            var detailView = document.getElementById('aiDetailView');

            currentView.style.display = 'none';
            historyView.style.display = 'none';
            detailView.style.display = 'flex';

            var detailMessages = document.getElementById('aiDetailMessages');
            detailMessages.innerHTML = data.messages.map(function(msg) {
                var date = new Date(msg.timestamp);
                var timeStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' +
                             date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                return '<div class="ai-message ' + (msg.role === 'user' ? 'user' : 'ai') + '">' +
                       escapeHtml(msg.content) +
                       '<span class="msg-time">' + timeStr + '</span></div>';
            }).join('');

            detailMessages.scrollTop = detailMessages.scrollHeight;
            aiDetailConvId = convId;
        }
    } catch (error) {
        console.error('加载对话详情失败:', error);
    }
}

// 返回历史列表
function backToAiHistory() {
    var currentView = document.getElementById('aiCurrentView');
    var historyView = document.getElementById('aiHistoryView');
    var detailView = document.getElementById('aiDetailView');

    currentView.style.display = 'none';
    historyView.style.display = 'flex';
    detailView.style.display = 'none';
}

// 删除对话
async function deleteAiHistory(convId) {
    if (!confirm('确定要删除这条对话记录吗？')) return;

    try {
        var response = await fetch('/api/ai/history/' + convId, { method: 'DELETE' });
        var data = await response.json();

        if (data.success) {
            if (aiDetailConvId === convId) {
                backToAiHistory();
            }
            loadAiHistory();
        }
    } catch (error) {
        console.error('删除对话失败:', error);
    }
}

// 删除当前对话
function deleteAiChat() {
    if (aiDetailConvId) {
        deleteAiHistory(aiDetailConvId);
    }
}

// 开始新对话
async function startNewChat() {
    try {
        var response = await fetch('/api/ai/history', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
        });
        var data = await response.json();

        if (data.success) {
            aiFooterConversationId = data.conversation_id;

            var messages = document.getElementById('aiMessages');
            messages.innerHTML = '<div class="ai-message ai">嗨！新对话开始啦～有什么学习问题可以问我哦！💪</div>';

            switchAiTab('current');
        }
    } catch (error) {
        console.error('创建新对话失败:', error);
    }
}

// HTML 转义
function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
